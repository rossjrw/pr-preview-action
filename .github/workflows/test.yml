name: Tests

on:
    push:

concurrency:
    group: test-${{ github.ref }}
    cancel-in-progress: true

jobs:
    no-scripts:
        name: No scripts check
        runs-on: ubuntu-latest
        steps:
            - name: Checkout
              uses: actions/checkout@v4

            - name: No scripts check
              uses: wow-look-at-my/actions@no-scripts-action#latest

    test-unit:
        name: Unit tests
        runs-on: ubuntu-latest
        steps:
            - name: Checkout
              uses: actions/checkout@v4

            - name: Install pnpm
              uses: pnpm/action-setup@v4

            - name: Setup Node.js
              uses: actions/setup-node@v4
              with:
                  node-version: 22
                  cache: pnpm

            - name: Install dependencies
              run: pnpm install --frozen-lockfile

            - name: Type check
              run: pnpm exec tsc --noEmit

            - name: Verify dist/ is up to date
              run: |
                  pnpm exec tsc
                  if ! git diff --exit-code dist/; then
                      echo "::error::dist/ is out of date. Run 'pnpm exec tsc' and commit the result."
                      exit 1
                  fi

            - name: Run tests
              run: bash test/run-unit-tests.sh
