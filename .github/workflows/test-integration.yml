name: Integration Tests

on:
    workflow_call:
        inputs:
            ref:
                description: "Git ref to checkout"
                required: true
                type: string
            sha:
                description: "Git SHA for the commit"
                required: true
                type: string
        secrets:
            test-deploy-token:
                description: "GitHub token for test deployments"
                required: true

jobs:
    # ── Lifecycle: deploy → verify → redeploy → verify → remove → verify ──

    lifecycle-deploy:
        name: "[Git] Lifecycle - Deploy"
        uses: ./.github/workflows/preview.yml
        with:
            source-dir: test/fixtures/lifecycle-init
            pr-number: test-git-lifecycle
            umbrella-dir: pr-preview-run-${{ github.run_id }}
            preview-branch: test-git-lifecycle
            action: deploy
            comment: false
            deploy-to-pages: false
            deploy-commit-message: deploy test-git-lifecycle ${{ github.run_id }}
        secrets: inherit

    lifecycle-verify-deploy:
        name: "[Git] Lifecycle - Verify deploy"
        needs: lifecycle-deploy
        runs-on: ubuntu-latest
        env:
            GITHUB_TOKEN: ${{ secrets.test-deploy-token }}
            DEPLOY_REPO: ${{ github.repository }}
            PREVIEW_BRANCH: test-git-lifecycle
            UMBRELLA_DIR: pr-preview-run-${{ github.run_id }}
        steps:
            - uses: actions/checkout@v6
              with:
                  ref: ${{ inputs.sha }}
            - run: bash test/integration/test-git-lifecycle.sh "deployed" "test-git-lifecycle-INITIALISED"

    lifecycle-redeploy:
        name: "[Git] Lifecycle - Redeploy"
        needs: lifecycle-verify-deploy
        uses: ./.github/workflows/preview.yml
        with:
            source-dir: test/fixtures/lifecycle-redeploy
            pr-number: test-git-lifecycle
            umbrella-dir: pr-preview-run-${{ github.run_id }}
            preview-branch: test-git-lifecycle
            action: deploy
            comment: false
            deploy-to-pages: false
            deploy-commit-message: deploy test-git-lifecycle ${{ github.run_id }}
        secrets: inherit

    lifecycle-verify-redeploy:
        name: "[Git] Lifecycle - Verify redeploy"
        needs: lifecycle-redeploy
        runs-on: ubuntu-latest
        env:
            GITHUB_TOKEN: ${{ secrets.test-deploy-token }}
            DEPLOY_REPO: ${{ github.repository }}
            PREVIEW_BRANCH: test-git-lifecycle
            UMBRELLA_DIR: pr-preview-run-${{ github.run_id }}
        steps:
            - uses: actions/checkout@v6
              with:
                  ref: ${{ inputs.sha }}
            - run: bash test/integration/test-git-lifecycle.sh "deployed" "test-git-lifecycle-REDEPLOYED"

    lifecycle-remove:
        name: "[Git] Lifecycle - Remove"
        needs: lifecycle-verify-redeploy
        uses: ./.github/workflows/preview.yml
        with:
            source-dir: test/fixtures/lifecycle-init
            pr-number: test-git-lifecycle
            umbrella-dir: pr-preview-run-${{ github.run_id }}
            preview-branch: test-git-lifecycle
            action: remove
            comment: false
            deploy-to-pages: false
            remove-commit-message: remove test-git-lifecycle ${{ github.run_id }}
        secrets: inherit

    lifecycle-verify-remove:
        name: "[Git] Lifecycle - Verify remove"
        needs: lifecycle-remove
        runs-on: ubuntu-latest
        env:
            GITHUB_TOKEN: ${{ secrets.test-deploy-token }}
            DEPLOY_REPO: ${{ github.repository }}
            PREVIEW_BRANCH: test-git-lifecycle
            UMBRELLA_DIR: pr-preview-run-${{ github.run_id }}
        steps:
            - uses: actions/checkout@v6
              with:
                  ref: ${{ inputs.sha }}
            - run: bash test/integration/test-git-lifecycle.sh "removed"

    lifecycle-cleanup:
        name: "[Git] Lifecycle - Cleanup"
        needs: [lifecycle-deploy, lifecycle-redeploy, lifecycle-remove, lifecycle-verify-remove]
        if: failure()
        runs-on: ubuntu-latest
        steps:
            - uses: actions/checkout@v6
              with:
                  ref: ${{ inputs.sha }}
            - run: |
                  source test/lib/cleanup-test-deployment.sh
                  cleanup_deployment "${{ github.repository }}" "test-git-lifecycle" "${{ secrets.test-deploy-token }}" "pr-preview-run-${{ github.run_id }}"

    # ── Custom umbrella: deploy → verify → cleanup ──

    custom-umbrella-deploy:
        name: "[Git] Custom umbrella - Deploy"
        uses: ./.github/workflows/preview.yml
        with:
            source-dir: test/fixtures/custom-umbrella
            pr-number: test-git-custom-umbrella
            umbrella-dir: custom-previews-run-${{ github.run_id }}
            preview-branch: test-git-custom-umbrella
            action: deploy
            comment: false
            deploy-to-pages: false
            deploy-commit-message: deploy test-git-custom-umbrella ${{ github.run_id }}
        secrets: inherit

    custom-umbrella-verify:
        name: "[Git] Custom umbrella - Verify"
        needs: custom-umbrella-deploy
        runs-on: ubuntu-latest
        env:
            GITHUB_TOKEN: ${{ secrets.test-deploy-token }}
            DEPLOY_REPO: ${{ github.repository }}
            PREVIEW_BRANCH: test-git-custom-umbrella
            TEST_UMBRELLA_DIR: pr-preview-run-${{ github.run_id }}
            CUSTOM_UMBRELLA_DIR: custom-previews-run-${{ github.run_id }}
        steps:
            - uses: actions/checkout@v6
              with:
                  ref: ${{ inputs.sha }}
            - run: bash test/integration/test-git-custom-umbrella.sh

    custom-umbrella-cleanup:
        name: "[Git] Custom umbrella - Cleanup"
        needs: [custom-umbrella-deploy, custom-umbrella-verify]
        if: always()
        runs-on: ubuntu-latest
        steps:
            - uses: actions/checkout@v6
              with:
                  ref: ${{ inputs.sha }}
            - run: |
                  source test/lib/cleanup-test-deployment.sh
                  cleanup_deployment "${{ github.repository }}" "test-git-custom-umbrella" "${{ secrets.test-deploy-token }}" "pr-preview-run-${{ github.run_id }}" "custom-previews-run-${{ github.run_id }}"

    # ── Concurrency: deploy pr1, deploy pr2, redeploy pr2 → verify both ──

    concurrent-deploy-pr1:
        name: "[Git] Concurrency - Deploy PR 1"
        uses: ./.github/workflows/preview.yml
        with:
            source-dir: test/fixtures/concurrent-1
            pr-number: test-git-concurrent-1
            umbrella-dir: pr-preview-run-${{ github.run_id }}
            preview-branch: test-git-concurrent
            action: deploy
            comment: false
            deploy-to-pages: false
            deploy-commit-message: deploy test-git-concurrent ${{ github.run_id }}
        secrets: inherit

    concurrent-deploy-pr2:
        name: "[Git] Concurrency - Deploy PR 2"
        needs: concurrent-deploy-pr1
        uses: ./.github/workflows/preview.yml
        with:
            source-dir: test/fixtures/concurrent-2
            pr-number: test-git-concurrent-2
            umbrella-dir: pr-preview-run-${{ github.run_id }}
            preview-branch: test-git-concurrent
            action: deploy
            comment: false
            deploy-to-pages: false
            deploy-commit-message: deploy test-git-concurrent ${{ github.run_id }}
        secrets: inherit

    concurrent-redeploy-pr2:
        name: "[Git] Concurrency - Redeploy PR 2"
        needs: concurrent-deploy-pr2
        uses: ./.github/workflows/preview.yml
        with:
            source-dir: test/fixtures/concurrent-2-redeploy
            pr-number: test-git-concurrent-2
            umbrella-dir: pr-preview-run-${{ github.run_id }}
            preview-branch: test-git-concurrent
            action: deploy
            comment: false
            deploy-to-pages: false
            deploy-commit-message: deploy test-git-concurrent ${{ github.run_id }}
        secrets: inherit

    concurrent-verify:
        name: "[Git] Concurrency - Verify"
        needs: concurrent-redeploy-pr2
        runs-on: ubuntu-latest
        env:
            GITHUB_TOKEN: ${{ secrets.test-deploy-token }}
            DEPLOY_REPO: ${{ github.repository }}
            PREVIEW_BRANCH: test-git-concurrent
            UMBRELLA_DIR: pr-preview-run-${{ github.run_id }}
        steps:
            - uses: actions/checkout@v6
              with:
                  ref: ${{ inputs.sha }}
            - run: bash test/integration/test-git-concurrent.sh

    concurrent-cleanup:
        name: "[Git] Concurrency - Cleanup"
        needs: [concurrent-deploy-pr1, concurrent-deploy-pr2, concurrent-redeploy-pr2, concurrent-verify]
        if: always()
        runs-on: ubuntu-latest
        steps:
            - uses: actions/checkout@v6
              with:
                  ref: ${{ inputs.sha }}
            - run: |
                  source test/lib/cleanup-test-deployment.sh
                  cleanup_deployment "${{ github.repository }}" "test-git-concurrent" "${{ secrets.test-deploy-token }}" "pr-preview-run-${{ github.run_id }}"

    # ── Pages lifecycle: deploy → verify → remove → verify ──

    pages-deploy:
        name: "[Pages] Lifecycle - Deploy"
        needs: [lifecycle-verify-remove, custom-umbrella-verify, concurrent-verify]
        uses: ./.github/workflows/preview.yml
        with:
            source-dir: test/fixtures/pages-lifecycle
            pr-number: test-pages-lifecycle
            umbrella-dir: pr-preview-run-${{ github.run_id }}
            preview-branch: main
            action: deploy
            comment: false
            deploy-commit-message: deploy test-pages-lifecycle ${{ github.run_id }}
        secrets: inherit

    pages-verify-deploy:
        name: "[Pages] Lifecycle - Verify deploy"
        needs: pages-deploy
        runs-on: ubuntu-latest
        env:
            GITHUB_TOKEN: ${{ secrets.test-deploy-token }}
            DEPLOY_REPO: ${{ github.repository }}
            PREVIEW_BRANCH: main
            UMBRELLA_DIR: pr-preview-run-${{ github.run_id }}
        steps:
            - uses: actions/checkout@v6
              with:
                  ref: ${{ inputs.sha }}
            - run: bash test/integration/test-pages-lifecycle.sh "deployed"

    pages-remove:
        name: "[Pages] Lifecycle - Remove"
        needs: pages-verify-deploy
        uses: ./.github/workflows/preview.yml
        with:
            source-dir: test/fixtures/pages-lifecycle
            pr-number: test-pages-lifecycle
            umbrella-dir: pr-preview-run-${{ github.run_id }}
            preview-branch: main
            action: remove
            comment: false
            remove-commit-message: remove test-pages-lifecycle ${{ github.run_id }}
        secrets: inherit

    pages-verify-remove:
        name: "[Pages] Lifecycle - Verify remove"
        needs: pages-remove
        runs-on: ubuntu-latest
        env:
            GITHUB_TOKEN: ${{ secrets.test-deploy-token }}
            DEPLOY_REPO: ${{ github.repository }}
            PREVIEW_BRANCH: main
            UMBRELLA_DIR: pr-preview-run-${{ github.run_id }}
        steps:
            - uses: actions/checkout@v6
              with:
                  ref: ${{ inputs.sha }}
            - run: bash test/integration/test-pages-lifecycle.sh "removed"

    pages-cleanup:
        name: "[Pages] Lifecycle - Cleanup"
        needs: [pages-deploy, pages-remove, pages-verify-remove]
        if: failure()
        runs-on: ubuntu-latest
        steps:
            - uses: actions/checkout@v6
              with:
                  ref: ${{ inputs.sha }}
            - run: |
                  source test/lib/cleanup-test-deployment.sh
                  cleanup_deployment "${{ github.repository }}" "test-pages-lifecycle" "${{ secrets.test-deploy-token }}" "pr-preview-run-${{ github.run_id }}"
